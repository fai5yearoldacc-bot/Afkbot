<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft AFK Bot Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-glow"></div>
  
  <div class="container">
    <header class="header card">
      <div class="header-title">
        <span class="icon">⛏️</span>
        <h1>Minecraft AFK Web</h1>
      </div>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Offline</span>
      </div>
    </header>

    <main class="grid">
      <section class="card form-card">
        <h2>Bot Controls</h2>
        <form id="botForm">
          <div class="form-group">
            <label for="username">Bot Name / Username *</label>
            <input type="text" id="username" placeholder="e.g. AFK_Bot_1" required>
          </div>

          <div class="form-row">
            <div class="form-group flex-2">
              <label for="host">Server IP *</label>
              <input type="text" id="host" placeholder="mc.example.com" required>
            </div>
            <div class="form-group flex-1">
              <label for="port">Port</label>
              <input type="number" id="port" value="25565" placeholder="25565">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group flex-1">
              <label for="authType">Command</label>
              <select id="authType">
                <option value="/login">/login</option>
                <option value="/register">/register</option>
              </select>
            </div>
            <div class="form-group flex-2">
              <label for="password">Password</label>
              <input type="password" id="password" placeholder="Server password (if required)">
            </div>
          </div>

          <div id="alertBox" class="alert hidden"></div>

          <div class="button-group">
            <button type="submit" id="startBtn" class="btn btn-primary">
              <span class="btn-icon">▶</span> Start Bot
            </button>
            <button type="button" id="stopBtn" class="btn btn-danger" disabled>
              <span class="btn-icon">⏹</span> Stop Bot
            </button>
          </div>
        </form>
      </section>

      <section class="card console-card">
        <div class="console-header">
          <h2>Console Logs</h2>
          <button id="clearLogsBtn" class="btn-sm">Clear</button>
        </div>
        <div class="console-body" id="consoleLogs">
          <div class="log-entry system">[System] Ready. Enter server details to connect.</div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
